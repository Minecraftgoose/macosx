<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
   <title>待办清单 · 毛玻璃极简</title>
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
           font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
       }

       body {
           min-height: 100vh;
           background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070&auto=format') center/cover no-repeat fixed;
           padding: 2rem 1rem;
           display: flex;
           justify-content: center;
           align-items: center;
       }

       .glass-todo {
           max-width: 600px;
           width: 100%;
           margin: 0 auto;
           background: rgba(22, 28, 36, 0.45);
           backdrop-filter: blur(14px);
           -webkit-backdrop-filter: blur(14px);
           border-radius: 2rem;
           border: 1px solid rgba(255, 255, 255, 0.2);
           box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
           padding: 1.8rem 1.8rem 2rem;
       }

       .title-section {
           margin-bottom: 1.8rem;
           text-align: left;
           border-bottom: 1px solid rgba(255, 255, 255, 0.2);
           padding-bottom: 0.8rem;
       }

       .title-section h1 {
           font-size: 2rem;
           font-weight: 540;
           letter-spacing: -0.3px;
           color: white;
           text-shadow: 0 2px 5px rgba(0,0,0,0.2);
       }

       .add-todo {
           display: flex;
           gap: 0.75rem;
           margin-bottom: 1.8rem;
           align-items: center;
       }

       #todoInput {
           flex: 1;
           background: rgba(20, 25, 35, 0.65);
           border: 1px solid rgba(255, 255, 255, 0.3);
           border-radius: 60px;
           padding: 0.8rem 1.2rem;
           font-size: 0.95rem;
           font-weight: 450;
           color: white;
           outline: none;
           backdrop-filter: blur(4px);
           transition: 0.2s;
       }

       #todoInput::placeholder {
           color: rgba(255, 255, 255, 0.6);
           font-weight: 400;
       }

       #todoInput:focus {
           border-color: rgba(255, 255, 255, 0.8);
           background: rgba(30, 38, 50, 0.8);
           box-shadow: 0 0 0 2px rgba(255,255,240,0.15);
       }

       #addBtn {
           background: rgba(255, 255, 255, 0.2);
           backdrop-filter: blur(4px);
           border: 1px solid rgba(255, 255, 255, 0.35);
           color: white;
           width: 2.8rem;
           height: 2.8rem;
           border-radius: 60px;
           font-size: 1.6rem;
           cursor: pointer;
           display: inline-flex;
           align-items: center;
           justify-content: center;
           transition: 0.2s;
           font-weight: 300;
           box-shadow: 0 2px 6px rgba(0,0,0,0.2);
       }

       #addBtn:hover {
           background: rgba(255, 255, 255, 0.35);
           transform: scale(0.96);
           border-color: rgba(255,255,245,0.7);
       }

       .stats {
           display: flex;
           justify-content: space-between;
           font-size: 0.7rem;
           font-weight: 500;
           color: rgba(255, 255, 255, 0.85);
           background: rgba(0,0,0,0.25);
           padding: 0.4rem 1rem;
           border-radius: 60px;
           margin-bottom: 1rem;
           letter-spacing: 0.3px;
       }

       .todo-list {
           list-style: none;
           margin: 0.25rem 0 1rem;
           display: flex;
           flex-direction: column;
           gap: 0.6rem;
           max-height: 380px;
           overflow-y: auto;
           padding-right: 0.2rem;
       }

       .todo-list::-webkit-scrollbar {
           width: 4px;
       }
       .todo-list::-webkit-scrollbar-track {
           background: rgba(255,255,255,0.1);
           border-radius: 10px;
       }
       .todo-list::-webkit-scrollbar-thumb {
           background: rgba(255,255,245,0.4);
           border-radius: 10px;
       }

       .todo-item {
           display: flex;
           align-items: center;
           justify-content: space-between;
           background: rgba(18, 22, 30, 0.6);
           backdrop-filter: blur(8px);
           border: 1px solid rgba(255, 255, 255, 0.2);
           border-radius: 60px;
           padding: 0.4rem 0.4rem 0.4rem 1.1rem;
           transition: all 0.2s;
           gap: 0.6rem;
       }

       .todo-item:hover {
           background: rgba(32, 38, 48, 0.75);
           border-color: rgba(255,255,210,0.4);
       }

       .todo-content {
           display: flex;
           align-items: center;
           gap: 0.8rem;
           flex: 1;
           overflow: hidden;
       }

       .todo-check {
           width: 1.2rem;
           height: 1.2rem;
           cursor: pointer;
           accent-color: #b9d0f0;
           flex-shrink: 0;
           filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
       }

       .todo-text {
           font-size: 0.95rem;
           color: #f1f5f9;
           word-break: break-word;
           flex: 1;
           transition: 0.1s;
           font-weight: 450;
           text-shadow: 0 1px 1px rgba(0,0,0,0.1);
       }

       .completed .todo-text {
           text-decoration: line-through;
           color: rgba(220, 230, 245, 0.65);
       }

       .delete-btn {
           background: rgba(210, 80, 80, 0.2);
           border: none;
           font-size: 1.15rem;
           cursor: pointer;
           color: rgba(255, 230, 230, 0.8);
           width: 2rem;
           height: 2rem;
           border-radius: 40px;
           display: inline-flex;
           align-items: center;
           justify-content: center;
           transition: 0.15s;
           font-weight: 500;
           backdrop-filter: blur(4px);
       }

       .delete-btn:hover {
           background: rgba(220, 100, 100, 0.65);
           color: white;
           transform: scale(0.94);
       }

       .empty-message {
           text-align: center;
           color: rgba(245, 245, 255, 0.7);
           font-size: 0.85rem;
           padding: 2rem 1rem;
           background: rgba(0,0,0,0.25);
           border-radius: 60px;
           backdrop-filter: blur(5px);
           margin-top: 0.5rem;
           font-weight: 450;
       }

       .footer-actions {
           margin-top: 1.5rem;
           display: flex;
           justify-content: flex-end;
       }

       .clear-btn {
           background: rgba(0, 0, 0, 0.4);
           backdrop-filter: blur(8px);
           border: 1px solid rgba(255,255,220,0.3);
           font-size: 0.7rem;
           color: #f0f3fa;
           cursor: pointer;
           padding: 0.4rem 1rem;
           border-radius: 60px;
           transition: 0.2s;
           font-weight: 500;
           letter-spacing: 0.3px;
       }

       .clear-btn:hover {
           background: rgba(160, 100, 100, 0.6);
           border-color: rgba(255,200,200,0.7);
           color: white;
       }

       @media (max-width: 500px) {
           .glass-todo {
               padding: 1.2rem;
           }
           .todo-item {
               padding: 0.3rem 0.3rem 0.3rem 0.8rem;
           }
           .title-section h1 {
               font-size: 1.7rem;
           }
       }
   </style>
</head>
<body>
<div class="glass-todo">
   <div class="title-section">
       <h1>待办清单</h1>
   </div>

   <div class="add-todo">
       <input type="text" id="todoInput" placeholder="写一个任务，比如 “整理笔记”" autocomplete="off">
       <button id="addBtn" aria-label="添加待办">+</button>
   </div>

   <div class="stats">
       <span id="pendingCount">0 待完成</span>
       <span id="totalCount">总计 0</span>
   </div>

   <ul class="todo-list" id="todoListContainer">
       <li class="empty-message">✨ 添加你的第一条任务</li>
   </ul>

   <div class="footer-actions">
       <button class="clear-btn" id="clearCompletedBtn">清除已完成</button>
   </div>
</div>

<script>
   let tasks = [];

   const todoInput = document.getElementById('todoInput');
   const addBtn = document.getElementById('addBtn');
   const todoContainer = document.getElementById('todoListContainer');
   const pendingCountSpan = document.getElementById('pendingCount');
   const totalCountSpan = document.getElementById('totalCount');
   const clearCompletedBtn = document.getElementById('clearCompletedBtn');

   function saveTasks() {
       localStorage.setItem('glass_todo_list', JSON.stringify(tasks));
   }

   function loadTasks() {
       const stored = localStorage.getItem('glass_todo_list');
       if (stored) {
           try {
               tasks = JSON.parse(stored);
               tasks = tasks.filter(t => t != null).map(t => ({ ...t, completed: t.completed === true }));
           } catch(e) { tasks = []; }
       } else {
           // 完全为空，没有任何预设示例
           tasks = [];
       }
       renderList();
   }

   function updateStats() {
       const total = tasks.length;
       const pending = tasks.filter(t => !t.completed).length;
       pendingCountSpan.innerText = `${pending} 待完成`;
       totalCountSpan.innerText = `总计 ${total}`;
   }

   function renderList() {
       if (!todoContainer) return;
       todoContainer.innerHTML = '';

       if (tasks.length === 0) {
           const emptyLi = document.createElement('li');
           emptyLi.className = 'empty-message';
           emptyLi.innerText = '📋 清单为空，添加新任务吧';
           todoContainer.appendChild(emptyLi);
           updateStats();
           return;
       }

       tasks.forEach(task => {
           const li = document.createElement('li');
           li.className = 'todo-item';
           if (task.completed) li.classList.add('completed');
           li.dataset.id = task.id;

           const contentDiv = document.createElement('div');
           contentDiv.className = 'todo-content';

           const checkbox = document.createElement('input');
           checkbox.type = 'checkbox';
           checkbox.className = 'todo-check';
           checkbox.checked = task.completed;
           checkbox.addEventListener('change', (e) => {
               e.stopPropagation();
               toggleComplete(task.id);
           });

           const textSpan = document.createElement('span');
           textSpan.className = 'todo-text';
           textSpan.innerText = task.text;

           contentDiv.appendChild(checkbox);
           contentDiv.appendChild(textSpan);

           const delBtn = document.createElement('button');
           delBtn.innerHTML = '✕';
           delBtn.className = 'delete-btn';
           delBtn.setAttribute('aria-label', '删除任务');
           delBtn.addEventListener('click', (e) => {
               e.stopPropagation();
               deleteTaskById(task.id);
           });

           li.appendChild(contentDiv);
           li.appendChild(delBtn);
           todoContainer.appendChild(li);
       });

       updateStats();
   }

   function toggleComplete(id) {
       const task = tasks.find(t => t.id == id);
       if (task) {
           task.completed = !task.completed;
           saveTasks();
           renderList();
       }
   }

   function deleteTaskById(id) {
       tasks = tasks.filter(t => t.id != id);
       saveTasks();
       renderList();
   }

   function addNewTodo() {
       let rawText = todoInput.value.trim();
       if (rawText === "") {
           todoInput.style.borderColor = "#ffb4a2";
           todoInput.placeholder = "内容不能为空…";
           setTimeout(() => {
               todoInput.style.borderColor = "rgba(255, 255, 255, 0.3)";
               todoInput.placeholder = "写一个任务，比如 “整理笔记”";
           }, 1200);
           return;
       }
       const newTask = {
           id: Date.now(),
           text: rawText.slice(0, 100),
           completed: false
       };
       tasks.unshift(newTask);
       saveTasks();
       todoInput.value = '';
       renderList();
       if (todoContainer.firstChild) {
           todoContainer.firstChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
       }
   }

   function clearCompleted() {
       const beforeCount = tasks.length;
       tasks = tasks.filter(t => !t.completed);
       if (tasks.length === beforeCount) return;
       saveTasks();
       renderList();
   }

   todoInput.addEventListener('keypress', (e) => {
       if (e.key === 'Enter') {
           e.preventDefault();
           addNewTodo();
       }
   });

   addBtn.addEventListener('click', addNewTodo);
   clearCompletedBtn.addEventListener('click', clearCompleted);

   loadTasks();
</script>
</body>
</html>
