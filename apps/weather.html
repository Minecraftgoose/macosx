<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-dark {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .weather-icon-anim {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .sunny-gradient { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .cloudy-gradient { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .rainy-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .snowy-gradient { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); }
        .default-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: rgba(255,255,255,0.8);
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .ai-content { line-height: 1.8; white-space: pre-wrap; }
    </style>
</head>
<body class="min-h-screen default-gradient transition-all duration-1000" id="app-body">
    
    <div class="min-h-screen flex flex-col items-center justify-start p-4 md:p-6 lg:p-8">
        
        <header class="w-full max-w-4xl flex justify-between items-center mb-6 md:mb-8 fade-in">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 md:w-10 md:h-10 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 md:w-6 md:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path>
                    </svg>
                </div>
                <h1 class="text-xl md:text-2xl font-bold text-white tracking-wide">天气</h1>
            </div>
            <div class="text-white/60 text-xs md:text-sm flex items-center gap-2">
                <div id="header-loading" class="loading-spinner w-3 h-3 md:w-4 md:h-4 border-2"></div>
                <span id="header-status">定位中...</span>
            </div>
        </header>

        <div class="w-full max-w-4xl mb-6 md:mb-8 fade-in" style="animation-delay: 0.1s">
            <div class="glass rounded-2xl p-2 flex items-center gap-2">
                <svg class="w-4 h-4 md:w-5 md:h-5 text-white/60 ml-2 md:ml-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input 
                    type="text" id="city-input" placeholder="输入城市名称..." 
                    class="flex-1 bg-transparent text-white placeholder-white/50 outline-none px-2 py-2 text-base md:text-lg min-w-0"
                    onkeypress="if(event.key==='Enter') searchCity()"
                >
                <button onclick="searchCity()" class="bg-white/20 hover:bg-white/30 text-white px-4 md:px-6 py-2 rounded-xl transition font-medium text-sm md:text-base whitespace-nowrap">
                    查询
                </button>
            </div>
        </div>

        <div id="loading" class="flex flex-col items-center gap-4 my-12 md:my-20">
            <div class="loading-spinner"></div>
            <p class="text-white/80 text-sm">正在获取位置和天气数据...</p>
        </div>

        <div id="error-msg" class="hidden w-full max-w-4xl glass rounded-2xl p-6 mb-6 text-center">
            <svg class="w-12 h-12 text-red-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <p class="text-white/90" id="error-text">获取数据失败</p>
            <button onclick="retryLocate()" class="mt-3 px-4 py-2 bg-white/20 rounded-lg text-sm text-white hover:bg-white/30 transition">重试</button>
        </div>

        <div id="weather-content" class="w-full max-w-4xl hidden space-y-4 md:space-y-6">
            
            <div class="glass rounded-3xl p-6 md:p-8 relative overflow-hidden fade-in">
                <div class="absolute top-0 right-0 w-48 h-48 md:w-64 md:h-64 bg-white/5 rounded-full -mr-16 -mt-16 md:-mr-20 md:-mt-20 blur-3xl"></div>
                
                <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div class="flex-1 w-full">
                        <div class="flex items-center gap-2 mb-2">
                            <svg class="w-4 h-4 md:w-5 md:h-5 text-white/80 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                            </svg>
                            <h2 class="text-2xl md:text-4xl font-bold text-white truncate" id="city-name">--</h2>
                        </div>
                        <p class="text-white/60 text-xs md:text-sm mb-1" id="update-time">更新时间：--</p>
                        <p class="text-white/80 text-base md:text-lg" id="weather-desc">--</p>
                    </div>
                    
                    <div class="flex items-center gap-4 md:gap-6 w-full md:w-auto justify-between md:justify-end">
                        <div class="weather-icon-anim" id="weather-icon"></div>
                        <div class="text-right">
                            <div class="text-5xl md:text-7xl font-light text-white tracking-tighter" id="temperature">--°</div>
                            <div class="text-white/60 text-xs md:text-sm mt-1" id="wind-info">--</div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mt-6 md:mt-8 pt-5 md:pt-6 border-t border-white/10">
                    <div class="text-center">
                        <p class="text-white/50 text-xs mb-1">风速</p>
                        <p class="text-white font-semibold text-base md:text-lg" id="wind-speed">--</p>
                    </div>
                    <div class="text-center">
                        <p class="text-white/50 text-xs mb-1">风向</p>
                        <p class="text-white font-semibold text-base md:text-lg" id="wind-direction">--</p>
                    </div>
                    <div class="text-center">
                        <p class="text-white/50 text-xs mb-1">海拔</p>
                        <p class="text-white font-semibold text-base md:text-lg" id="elevation">--</p>
                    </div>
                    <div class="text-center">
                        <p class="text-white/50 text-xs mb-1">时区</p>
                        <p class="text-white font-semibold text-base md:text-lg" id="timezone">--</p>
                    </div>
                </div>
            </div>

            <!-- AI 建议 -->
            <div class="glass rounded-2xl p-5 md:p-6 fade-in" style="animation-delay: 0.15s" id="ai-card">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-400 to-pink-400 flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <h3 class="text-white font-semibold text-sm md:text-base">出行穿衣建议</h3>
                    <div id="ai-loading" class="loading-spinner w-4 h-4 border-2 ml-auto hidden"></div>
                </div>
                <div class="glass-dark rounded-xl p-4 md:p-5 min-h-[60px]">
                    <div class="ai-content text-white/90 text-sm md:text-base" id="ai-advice">--</div>
                </div>
            </div>

            <div class="glass rounded-2xl p-5 md:p-6 fade-in" style="animation-delay: 0.2s">
                <h3 class="text-white font-semibold mb-4 flex items-center gap-2 text-sm md:text-base">
                    <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    位置信息
                </h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 text-xs md:text-sm">
                    <div class="glass-dark rounded-xl p-3">
                        <p class="text-white/50 text-xs">IP 地址</p>
                        <p class="text-white font-mono mt-1 text-xs break-all" id="ip-address">--</p>
                    </div>
                    <div class="glass-dark rounded-xl p-3">
                        <p class="text-white/50 text-xs">归属地</p>
                        <p class="text-white mt-1 text-xs md:text-sm" id="ip-location">--</p>
                    </div>
                    <div class="glass-dark rounded-xl p-3">
                        <p class="text-white/50 text-xs">经纬度</p>
                        <p class="text-white font-mono mt-1 text-xs break-all" id="coordinates">--</p>
                    </div>
                    <div class="glass-dark rounded-xl p-3">
                        <p class="text-white/50 text-xs">ISP</p>
                        <p class="text-white mt-1 text-xs leading-tight" id="isp">--</p>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        const BASE_URL = 'https://api.qitry.vip';
        const API_KEY = 'sk_EQ4HTMiRyRQ6n3ZCKcClBQX5J2Iru3Kj';
        const API_ENDPOINT = 'https://gen.pollinations.ai/v1/chat/completions';

        const wmoCodes = {
            0: { desc: '晴', icon: 'sunny' }, 1: { desc: '大部晴朗', icon: 'sunny' },
            2: { desc: '多云', icon: 'cloudy' }, 3: { desc: '阴', icon: 'cloudy' },
            45: { desc: '雾', icon: 'fog' }, 48: { desc: '雾凇', icon: 'fog' },
            51: { desc: '毛毛雨', icon: 'rain' }, 53: { desc: '小雨', icon: 'rain' },
            55: { desc: '中雨', icon: 'rain' }, 56: { desc: '冻雨', icon: 'rain' },
            57: { desc: '冻雨', icon: 'rain' }, 61: { desc: '小雨', icon: 'rain' },
            63: { desc: '中雨', icon: 'rain' }, 65: { desc: '大雨', icon: 'rain' },
            66: { desc: '冻雨', icon: 'rain' }, 67: { desc: '冻雨', icon: 'rain' },
            71: { desc: '小雪', icon: 'snow' }, 73: { desc: '中雪', icon: 'snow' },
            75: { desc: '大雪', icon: 'snow' }, 77: { desc: '雪粒', icon: 'snow' },
            80: { desc: '阵雨', icon: 'rain' }, 81: { desc: '强阵雨', icon: 'rain' },
            82: { desc: '暴雨', icon: 'rain' }, 85: { desc: '阵雪', icon: 'snow' },
            86: { desc: '强阵雪', icon: 'snow' }, 95: { desc: '雷雨', icon: 'thunder' },
            96: { desc: '雷阵雨', icon: 'thunder' }, 99: { desc: '雷暴', icon: 'thunder' }
        };

        function getWeatherInfo(code) { return wmoCodes[code] || { desc: '未知', icon: 'sunny' }; }
        function getWindDirection(deg) { 
            if (deg == null) return '--';
            return ['北','东北','东','东南','南','西南','西','西北'][Math.round(deg/45)%8]; 
        }

        function getWeatherIcon(type) {
            const i = {
                sunny: `<svg class="w-16 h-16 md:w-20 md:h-20 text-yellow-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,
                cloudy: `<svg class="w-16 h-16 md:w-20 md:h-20 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>`,
                rain: `<svg class="w-16 h-16 md:w-20 md:h-20 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 16.2A4.5 4.5 0 0017.5 8h-1.8c-.7-2.5-2.9-4.3-5.7-4.3-3.4 0-6.1 2.6-6.1 6 0 .6.1 1.2.3 1.7A4.5 4.5 0 005 16.2C5 18.3 6.7 20 9 20h7.5c2.5 0 4.5-1.7 4.5-3.8z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 22v-2m4 2v-2m4 2v-2"/></svg>`,
                snow: `<svg class="w-16 h-16 md:w-20 md:h-20 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v18m9-9H3m15.364-6.364l-12.728 12.728m12.728 0L6.636 6.636"/></svg>`,
                thunder: `<svg class="w-16 h-16 md:w-20 md:h-20 text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>`,
                fog: `<svg class="w-16 h-16 md:w-20 md:h-20 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15h18M3 12h18M3 9h18"/></svg>`
            };
            return i[type] || i.sunny;
        }

        function setTheme(iconType) {
            const body = document.getElementById('app-body');
            body.className = 'min-h-screen transition-all duration-1000 ';
            const map = { sunny: 'sunny-gradient', cloudy: 'cloudy-gradient', rain: 'rainy-gradient', snow: 'snowy-gradient', thunder: 'rainy-gradient', fog: 'cloudy-gradient' };
            body.classList.add(map[iconType] || 'default-gradient');
        }

        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('weather-content').classList.add('hidden');
            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('header-loading').classList.remove('hidden');
            document.getElementById('header-status').textContent = '定位中...';
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('header-loading').classList.add('hidden');
            document.getElementById('header-status').textContent = '已定位';
        }

        function showError(msg) {
            hideLoading();
            document.getElementById('error-text').textContent = msg;
            document.getElementById('error-msg').classList.remove('hidden');
        }

        function retryLocate() { initApp(); }

        async function getIPInfo() {
            const res = await fetch(`${BASE_URL}/api/ip`);
            const result = await res.json();
            if (result.code !== 200) throw new Error(result.message || 'IP 查询失败');
            return result.data;
        }

        async function getWeather(params) {
            const qs = new URLSearchParams(params).toString();
            const res = await fetch(`${BASE_URL}/api/weather?${qs}`);
            const result = await res.json();
            if (result.code !== 200) throw new Error(result.message || '天气查询失败');
            return result.data;
        }

        function typeWriter(element, text, speed = 25) {
            element.classList.add('typing-cursor');
            element.textContent = '';
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    element.classList.remove('typing-cursor');
                }
            }
            type();
        }

        async function getAIAdvice(weatherData, city) {
            const current = weatherData?.current_weather || {};
            const wmo = getWeatherInfo(current.weathercode);
            const prompt = `你是贴心的天气出行顾问。用户会提供实时天气数据，你直接输出建议，不要分析数据、不要写思考过程、不要输出任何推理步骤。

绝对禁止输出 <think> 标签及其内部内容。禁止输出"首先"、"根据"、"用户提供了"、"我需要"、"思考"等分析性词汇。

输出要求：
- 纯文本，60-80字，2-3句
- 第一句：穿衣核心建议（具体到衣物，如"薄卫衣+外套"）
- 第二句：出行注意事项（带伞/防晒/防滑/防风等）
- 禁止罗列原始数据
- 语气像朋友随口提醒，自然、有温度

天气类型差异化：
- 晴/热：透气、防晒、补水
- 阴/凉：外套、洋葱式穿衣
- 雨/雪：防水、防滑、交通
- 大风：防风、避免户外
- 雾霾：口罩、减少外出

正确示例：
今天阴凉，穿件薄针织衫搭防风外套刚好。出门带把折叠伞备着，南风有点凉，别穿太少。
：
- 城市：${city || '未知'}
- 天气：${wmo.desc}
- 温度：${current.temperature ?? '--'}°C
- 风速：${current.windspeed ?? '--'} km/h，风向${getWindDirection(current.winddirection)}
请直接给出建议，不要重复天气数据。`;

            try {
                const res = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: 'deepseek', messages: [{ role: 'user', content: prompt }], stream: false, max_tokens: 200 })
                });
                const result = await res.json();
                let content = result.choices?.[0]?.message?.content || 'AI 暂无建议，请根据天气自行判断。';
                
                // 过滤掉 <think> 标签及其内部内容（包括可能的换行和嵌套）
                content = content.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
                // 如果过滤后变成空字符串，返回默认提示
                if (!content) content = 'AI 暂时没有生成有效建议，请根据天气自行判断穿衣。';
                
                return content;
            } catch (e) {
                console.error('AI 请求失败:', e);
                return 'AI 服务暂时不可用，请根据天气自行判断穿衣。';
            }
        }

        // 安全格式化数字
        function fmtCoord(v) { return (typeof v === 'number') ? v.toFixed(4) : '--'; }
        function fmtStr(v) { return v ?? '--'; }

        function renderWeather(weatherData, ipData) {
            hideLoading();
            document.getElementById('weather-content').classList.remove('hidden');

            const current = weatherData?.current_weather || {};
            const wmo = getWeatherInfo(current?.weathercode);
            const city = ipData?.city || ipData?.regionName || '当前位置';

            // 天气卡片
            document.getElementById('city-name').textContent = city;
            document.getElementById('temperature').textContent = `${fmtStr(current.temperature)}°`;
            document.getElementById('weather-desc').textContent = wmo.desc;
            document.getElementById('update-time').textContent = `观测时间：${fmtStr(current.time)}`;
            document.getElementById('wind-info').textContent = `${getWindDirection(current?.winddirection)}风 ${fmtStr(current.windspeed)} km/h`;
            
            document.getElementById('wind-speed').textContent = `${fmtStr(current.windspeed)} km/h`;
            document.getElementById('wind-direction').textContent = `${getWindDirection(current?.winddirection)}`;
            document.getElementById('elevation').textContent = `${fmtStr(weatherData?.elevation)} m`;
            document.getElementById('timezone').textContent = fmtStr(weatherData?.timezone_abbreviation);

            // 位置卡片 - 安全访问，避免 undefined.toFixed 报错
            document.getElementById('ip-address').textContent = fmtStr(ipData?.query);
            document.getElementById('ip-location').textContent = `${fmtStr(ipData?.country)} ${fmtStr(ipData?.regionName)} ${fmtStr(ipData?.city)}`;
            document.getElementById('coordinates').textContent = `${fmtCoord(ipData?.lat)}, ${fmtCoord(ipData?.lon)}`;
            document.getElementById('isp').textContent = fmtStr(ipData?.isp);

            // 图标和主题
            document.getElementById('weather-icon').innerHTML = getWeatherIcon(wmo.icon);
            setTheme(wmo.icon);

            // AI 建议：异步加载，绝不阻塞天气显示
            loadAIAdvice(weatherData, city);
        }

        // 独立加载 AI，即使挂了也不影响天气
        async function loadAIAdvice(weatherData, city) {
            const aiEl = document.getElementById('ai-advice');
            const aiLoading = document.getElementById('ai-loading');
            
            aiLoading.classList.remove('hidden');
            aiEl.textContent = '正在分析天气数据...';
            
            const advice = await getAIAdvice(weatherData, city);
            
            aiLoading.classList.add('hidden');
            typeWriter(aiEl, advice, 20);
        }

        async function searchCity() {
            const city = document.getElementById('city-input').value.trim();
            if (!city) return;

            showLoading();
            try {
                const weatherData = await getWeather({ city });
                const mockIP = {
                    city: city, regionName: '', country: '中国', query: '-',
                    lat: weatherData?.location?.lat ?? weatherData?.latitude ?? null,
                    lon: weatherData?.location?.lon ?? weatherData?.longitude ?? null,
                    isp: '-'
                };
                renderWeather(weatherData, mockIP);
            } catch (e) {
                showError(e.message);
            }
        }

        async function initApp() {
            showLoading();
            try {
                const ipData = await getIPInfo();
                const weatherData = await getWeather({ latitude: ipData.lat, longitude: ipData.lon });
                renderWeather(weatherData, ipData);
            } catch (e) {
                showError(e.message);
            }
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
